<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Car API Tester</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea, select {
            width: 420px;
            padding: 6px;
        }

        textarea {
            height: 120px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #response {
            margin-top: 30px;
            background: #f5f5f5;
            padding: 15px;
            border: 1px solid #ccc;
            white-space: pre-wrap;
            font-family: monospace;
        }

        #tokenBox {
            background: #eef;
            padding: 10px;
            margin-top: 10px;
        }

    </style>

</head>
<body>

<h2>Car API Test Tool</h2>

<h3>Авторизация</h3>

<label>Login</label>
<input id="login" value="admin">

<label>Password</label>
<input id="password" type="password" value="123456">

<button onclick="login()">Login</button>

<div id="tokenBox">
    <b>Token:</b>
    <pre id="token"></pre>
</div>

<hr>

<label>Метод API</label>

<select id="apiMethod" onchange="toggleForms()">
    <option value="create">POST /car/create</option>
    <option value="get">GET /car/{id}</option>
    <option value="list">GET /car/list</option>
</select>

<div id="idBlock">

    <label>ID объявления</label>
    <input id="car_id" value="1">

</div>

<div id="listParams">

    <label>Page</label>
    <input id="page" value="1">

    <label>Page Size</label>
    <input id="pageSize" value="10">

    <label>Sort</label>
    <select id="sort">
        <option value="">без сортировки</option>

        <option value="id">ID ↑</option>
        <option value="-id">ID ↓</option>

        <option value="title">Title ↑</option>
        <option value="-title">Title ↓</option>

        <option value="price">Price ↑</option>
        <option value="-price">Price ↓</option>

        <option value="created_at">Created ↑</option>
        <option value="-created_at" selected>Created ↓ (новые сначала)</option>

    </select>

</div>

<div id="postForm">

    <h3>POST данные</h3>

    <label>Title</label>
    <input id="title" value="BMW X5">

    <label>Description</label>
    <input id="description" value="Без пробега по РФ">

    <label>Price</label>
    <input id="price" value="5500000">

    <label>Photo URL</label>
    <input id="photo_url" value="https://example.com/bmw.jpg">

    <label>Contacts</label>
    <input id="contacts" value="ivan@example.com">

    <label>Options (JSON)</label>

    <textarea id="options">
{
 "brand":"BMW",
 "model":"X5",
 "year":2022,
 "body":"SUV",
 "mileage":0
}
</textarea>

</div>

<button onclick="sendRequest()">Send</button>

<h3>Response</h3>

<pre id="response"></pre>

<script src="/js/api-tester.js"></script>

</body>
</html>
